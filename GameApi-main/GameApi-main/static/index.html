<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ludo Semplice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="ludo-app">

    <!-- HEADER -->
    <header class="ludo-header">
      <div class="header-left">
        <div class="logo-mark">L</div>
        <div>
          <h1 class="header-title">Ludo</h1>
          <p class="header-sub">REST API · multiplayer · turni</p>
        </div>
      </div>
      <a class="btn-ghost" href="./index.html">← Home</a>
    </header>

    <!-- LAYOUT -->
    <div class="layout-grid">

      <!-- ── SIDEBAR SINISTRA: LOBBY ── -->
      <aside class="panel" id="panel-lobby">
        <div class="panel-head">
          <h2 class="panel-title">Lobby</h2>
          <button id="refreshLobbiesBtn" class="btn-icon" type="button" title="Aggiorna">↻</button>
        </div>

        <form id="createLobbyForm" class="create-form">
          <input id="lobbyName" class="field" maxlength="40" placeholder="Nome partita…" required>
          <button class="btn-primary" type="submit">Crea</button>
        </form>

        <div id="lobbyList" class="lobby-list"></div>
      </aside>

      <!-- ── CENTRALE: BOARD ── -->
      <section class="panel board-panel" id="panel-board">

        <!-- Intestazione partita -->
        <div class="board-header">
          <div class="board-header-left">
            <h2 id="activeLobbyTitle" class="board-title">Seleziona una lobby</h2>
            <p id="lobbyStatus" class="board-status">Crea o apri una partita per iniziare.</p>
          </div>
          <div class="board-header-right">
            <button id="deleteGameBtn" class="btn-danger" type="button" style="display:none">Elimina</button>
            <span id="turnBadge" class="turn-badge neutral">In attesa</span>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <form id="joinForm" class="join-form">
            <input id="nickname" class="field" maxlength="20" placeholder="Il tuo nickname" required>
            <button id="joinBtn" class="btn-primary" type="submit">Entra</button>
          </form>

          <div class="dice-box">
            <div class="dice-display">
              <span class="dice-label">Dado</span>
              <strong id="diceValue" class="dice-num">–</strong>
            </div>
            <button id="rollDiceBtn" class="btn-roll" type="button" disabled>
              <span class="roll-icon">⚄</span>
              <span>Lancia</span>
            </button>
          </div>
        </div>

        <!-- Picker pedine (appare solo quando serve scegliere) -->
        <div id="pawnPicker" class="pawn-picker hidden"></div>

        <!-- Board + centro -->
        <div class="board-shell">
          <div class="board-stage">
            <div class="corner-home home-green"><span>Verde</span></div>
            <div class="corner-home home-red"><span>Rosso</span></div>
            <div class="corner-home home-yellow"><span>Giallo</span></div>
            <div class="corner-home home-blue"><span>Blu</span></div>
            <div id="board" class="ludo-board" aria-label="Tabellone Ludo"></div>
          </div>

          <div class="center-panel">
            <div class="center-star">★</div>
            <h3 class="center-title">Centro</h3>
            <p id="winnerText" class="center-text">Il primo che raggiunge il centro vince.</p>
          </div>
        </div>

      </section>

      <!-- ── SIDEBAR DESTRA: GIOCATORI + MOSSE ── -->
      <aside class="panel" id="panel-side">

        <div class="panel-head">
          <h2 class="panel-title">Giocatori</h2>
          <span id="playerCount" class="count-badge">0/4</span>
        </div>
        <div id="playerList" class="player-list"></div>

        <div class="panel-head mt-4">
          <h2 class="panel-title">Mosse</h2>
        </div>
        <ol id="moveList" class="move-list"></ol>

      </aside>

    </div><!-- /layout-grid -->
  </main>

  <div id="toastWrap" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="./script.js"></script>
</body>
</html>
